<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureWL — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail" data-bg-color="#f5f4f0">
  <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="300" fill="#f5f4f0"/>
    <rect x="110" y="60" width="180" height="180" rx="4" fill="#fff" stroke="#2d2d2d" stroke-width="3"/>
    <rect x="130" y="85" width="80" height="22" rx="3" fill="#1e1340"/>
    <rect x="130" y="120" width="140" height="14" rx="2" fill="#e0ddd8"/>
    <rect x="130" y="142" width="140" height="14" rx="2" fill="#e0ddd8"/>
    <rect x="130" y="165" width="140" height="22" rx="3" fill="#1e1340"/>
    <rect x="130" y="195" width="140" height="22" rx="3" fill="#fff" stroke="#2d2d2d" stroke-width="2"/>
  </svg>
</template>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Caveat', cursive;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Sketchy background grid */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,63,166,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,63,166,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    background: #fff;
    border: 2.5px solid #2d2d2d;
    border-radius: 4px;
    box-shadow: 6px 6px 0 #2d2d2d;
    padding: 40px 44px 36px;
    width: 400px;
    position: relative;
    transform: rotate(-0.3deg);
  }

  .logo-area {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-badge {
    display: inline-block;
    background: #1e1340;
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 4px;
    border: 2px solid rgba(255,255,255,0.2);
    letter-spacing: 1px;
    transform: rotate(-0.5deg);
  }

  .logo-sub {
    color: #888;
    font-size: 15px;
    margin-top: 8px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
    color: #aaa;
    font-size: 13px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    border-top: 1.5px dashed #ccc;
  }

  label {
    display: block;
    font-size: 15px;
    color: #555;
    margin-bottom: 5px;
  }

  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    border: 2px solid #2d2d2d;
    border-radius: 3px;
    padding: 9px 12px;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    background: #fafafa;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input:focus {
    border-color: #5b3fa6;
    box-shadow: 2px 2px 0 #5b3fa6;
    background: #fff;
  }

  .btn-primary {
    width: 100%;
    background: #1e1340;
    color: #fff;
    border: 2px solid #2d2d2d;
    border-radius: 3px;
    padding: 11px;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 3px 3px 0 #2d2d2d;
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 2px;
  }

  .btn-primary:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #2d2d2d;
  }

  .btn-primary:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #2d2d2d;
  }

  .btn-google {
    width: 100%;
    background: #fff;
    color: #333;
    border: 2px solid #2d2d2d;
    border-radius: 3px;
    padding: 10px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #2d2d2d;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn-google:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #2d2d2d;
    background: #f8f4ff;
  }

  .btn-google:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #2d2d2d;
  }

  .google-icon {
    width: 20px;
    height: 20px;
  }

  .error-msg {
    background: #fde8e6;
    border: 1.5px solid #c0392b;
    border-radius: 3px;
    color: #c0392b;
    font-size: 14px;
    padding: 8px 12px;
    margin-bottom: 12px;
    display: none;
  }

  .footer-note {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    margin-top: 18px;
  }

  /* Annotation */
  .sticky-note {
    position: absolute;
    top: -18px;
    right: -12px;
    background: #fef9e7;
    border: 1.5px solid #b8860b;
    padding: 5px 10px;
    font-size: 12px;
    color: #b8860b;
    transform: rotate(2deg);
    border-radius: 2px;
    box-shadow: 2px 2px 0 #b8860b44;
  }
</style>
</head>
<body>

<div class="card">
  <div class="sticky-note">Windsor · Marketing Hub</div>

  <div class="logo-area">
    <div class="logo-badge">PureWL</div>
    <div class="logo-sub">Sign in to your dashboard</div>
  </div>

  <!-- Google Login -->
  <button class="btn-google" onclick="loginGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">or sign in with email</div>

  <div id="error-msg" class="error-msg">Incorrect email or password. Try again.</div>

  <label>Email</label>
  <input type="email" id="email" placeholder="you@purevpn.com" />

  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') loginLocal()" />

  <button class="btn-primary" onclick="loginLocal()">Sign In →</button>

  <div class="footer-note">PureVPN White Label · Internal Tool</div>
</div>

<script>
  // Demo credentials
  const DEMO_USERS = [
    { email: 'admin@purevpn.com', password: 'pure123', name: 'Alex Windsor' },
    { email: 'marketing@purevpn.com', password: 'mkt2026', name: 'Sarah Ahmed' },
    { email: 'demo@disrupt.com', password: 'demo', name: 'Demo User' },
  ];

  function loginLocal() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const user = DEMO_USERS.find(u => u.email === email && u.password === password);

    if (user) {
      localStorage.setItem('purewl_user', JSON.stringify({ name: user.name, email: user.email, avatar: user.name.split(' ').map(n=>n[0]).join('') }));
      window.location.href = 'PureWL Dashboard.html';
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  function loginGoogle() {
    // Simulate Google OAuth — in prod this would be a real OAuth flow
    const name = prompt('Google Sign-In (demo)\n\nEnter your name:') || 'Google User';
    const email = prompt('Enter your Google email:') || 'user@gmail.com';
    localStorage.setItem('purewl_user', JSON.stringify({
      name: name,
      email: email,
      avatar: name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2),
      provider: 'google'
    }));
    window.location.href = 'PureWL Dashboard.html';
  }

  // If already logged in, go straight to dashboard
  if (localStorage.getItem('purewl_user')) {
    window.location.href = 'PureWL Dashboard.html';
  }
</script>

</body>
</html>
